name: Build and Deploy to EKS

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-southeast-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and Push to ECR
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  # Build and Push Vote
                  docker build -t $ECR_REGISTRY/vote-app:$IMAGE_TAG ./vote
                  docker push $ECR_REGISTRY/vote-app:$IMAGE_TAG

                  # Build and Push Worker
                  docker build -t $ECR_REGISTRY/worker-app:$IMAGE_TAG ./worker
                  docker push $ECR_REGISTRY/worker-app:$IMAGE_TAG

                  # Build and Push Result
                  docker build -t $ECR_REGISTRY/result-app:$IMAGE_TAG ./result
                  docker push $ECR_REGISTRY/result-app:$IMAGE_TAG

                  # Pass these variables to the next step
                  echo "VOTE_IMAGE=$ECR_REGISTRY/vote-app:$IMAGE_TAG" >> $GITHUB_ENV
                  echo "WORKER_IMAGE=$ECR_REGISTRY/worker-app:$IMAGE_TAG" >> $GITHUB_ENV
                  echo "RESULT_IMAGE=$ECR_REGISTRY/result-app:$IMAGE_TAG" >> $GITHUB_ENV

            - name: Update Kubeconfig
              run: aws eks update-kubeconfig --name eks-microservices --region ap-southeast-1

            - name: Inject ECR URLs into Manifests
              run: |
                  sed -i "s|ECR_URL_PLACEHOLDER_VOTE|$VOTE_IMAGE|g" k8s/voting-app-deploy.yaml
                  sed -i "s|ECR_URL_PLACEHOLDER_WORKER|$WORKER_IMAGE|g" k8s/worker-app-deploy.yaml
                  sed -i "s|ECR_URL_PLACEHOLDER_RESULT|$RESULT_IMAGE|g" k8s/result-app-deploy.yaml

            - name: Deploy to EKS
              run: kubectl apply -f k8s/
